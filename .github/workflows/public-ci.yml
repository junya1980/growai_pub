name: public-ci

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: List public files
        run: find . -maxdepth 4 -type f -not -path './.git/*' | sort

      - name: Validate packet
        run: python3 public_ci/scripts/check_public_packet.py --root . --write-manifest

      - name: Stage packet artifact
        run: |
          mkdir -p public_ci/packets
          cp public_ci/packet_manifest.json public_ci/packets/packet_manifest.json

      - name: Upload packet result
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: public-packet-result
          path: public_ci/packets/
          if-no-files-found: ignore
